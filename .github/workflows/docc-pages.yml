name: Build DocC and publish to GitHub Pages (docs/)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: docc-pages
    cancel-in-progress: true

jobs:
    docc:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Xcode version
              run: xcodebuild -version

            - name: List schemes (debug)
              run: |
                  set -euo pipefail
                  xcodebuild -list -project GestorContas.xcodeproj

            - name: Build DocC + export for static hosting
              run: |
                  set -euo pipefail

                  SCHEME="GestorContas"
                  HOSTING_BASE_PATH="GestorContas"

                  # Build DocC (disable signing)
                  xcodebuild docbuild \
                    -scheme "$SCHEME" \
                    -destination "generic/platform=iOS" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    DEVELOPMENT_TEAM=""

                  # Ask Xcode where DerivedData is for this scheme, then search from there.
                  DERIVED_DATA_DIR="$(xcodebuild -showBuildSettings \
                    -scheme "$SCHEME" \
                    -destination "generic/platform=iOS" \
                    2>/dev/null | awk -F' = ' '/DERIVED_DATA_DIR/ {print $2; exit}')"

                  if [ -z "${DERIVED_DATA_DIR:-}" ]; then
                    echo "Could not determine DERIVED_DATA_DIR"
                    exit 1
                  fi

                  echo "DERIVED_DATA_DIR=$DERIVED_DATA_DIR"

                  DOCCARCHIVE="$(find "$DERIVED_DATA_DIR" -type d -name "*.doccarchive" | head -n 1 || true)"

                  if [ -z "${DOCCARCHIVE:-}" ]; then
                    echo "No .doccarchive found under $DERIVED_DATA_DIR"
                    echo "Dumping candidates:"
                    find "$DERIVED_DATA_DIR" -maxdepth 6 -type d -name "*docc*" || true
                    exit 1
                  fi

                  echo "DocC archive: $DOCCARCHIVE"

                  mkdir -p docs/docc
                  xcrun docc process-archive transform-for-static-hosting "$DOCCARCHIVE" \
                    --output-path docs/docc \
                    --hosting-base-path "$HOSTING_BASE_PATH"

                  touch docs/docc/.nojekyll

            - name: Commit and push generated DocC
              run: |
                  set -euo pipefail

                  if git status --porcelain | grep -q .; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add docs/docc
                    git commit -m "Update DocC (auto)"
                    git push
                  else
                    echo "No changes to commit."
                  fi
