name: Build DocC and publish to GitHub Pages (docs/)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: docc-pages
    cancel-in-progress: true

jobs:
    docc:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Xcode version
              run: xcodebuild -version

            - name: List schemes (debug)
              run: |
                  set -euo pipefail
                  xcodebuild -list -project GestorContas.xcodeproj

            - name: Build DocC + export for static hosting
              run: |
                  set -euo pipefail

                  SCHEME="GestorContas"
                  HOSTING_BASE_PATH="GestorContas"
                  DERIVED_DATA_PATH="$PWD/.derivedData"

                  rm -rf "$DERIVED_DATA_PATH"
                  mkdir -p "$DERIVED_DATA_PATH"

                  # Build DocC (disable signing) and force derived data path
                  xcodebuild docbuild \
                    -project GestorContas.xcodeproj \
                    -scheme "$SCHEME" \
                    -destination "generic/platform=iOS" \
                    -derivedDataPath "$DERIVED_DATA_PATH" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    DEVELOPMENT_TEAM=""

                  echo "Searching for .doccarchive in forced derived data path: $DERIVED_DATA_PATH"
                  DOCCARCHIVE="$(find "$DERIVED_DATA_PATH" -type d -name "*.doccarchive" | head -n 1 || true)"

                  # Fallback: sometimes Xcode still writes to the default DerivedData location
                  if [ -z "${DOCCARCHIVE:-}" ]; then
                    echo "Not found in $DERIVED_DATA_PATH. Falling back to ~/Library/Developer/Xcode/DerivedData ..."
                    DOCCARCHIVE="$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d -name "*.doccarchive" | head -n 1 || true)"
                  fi

                  if [ -z "${DOCCARCHIVE:-}" ]; then
                    echo "No .doccarchive found."
                    echo "Debug: listing potential docc-related dirs (forced path):"
                    find "$DERIVED_DATA_PATH" -maxdepth 8 -type d -name "*docc*" || true
                    echo "Debug: listing potential docc-related dirs (default path):"
                    find "$HOME/Library/Developer/Xcode/DerivedData" -maxdepth 6 -type d -name "*docc*" || true
                    exit 1
                  fi

                  echo "DocC archive: $DOCCARCHIVE"

                  mkdir -p docs/docc
                  xcrun docc process-archive transform-for-static-hosting "$DOCCARCHIVE" \
                    --output-path docs/docc \
                    --hosting-base-path "$HOSTING_BASE_PATH"

                  touch docs/docc/.nojekyll

            - name: Commit and push generated DocC
              run: |
                  set -euo pipefail

                  if git status --porcelain | grep -q .; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add docs/docc
                    git commit -m "Update DocC (auto)"
                    git push
                  else
                    echo "No changes to commit."
                  fi
