name: Build DocC and publish to GitHub Pages (docs/)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

# We will commit generated files back to the repo
permissions:
    contents: write

concurrency:
    group: docc-pages
    cancel-in-progress: true

jobs:
    docc:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Xcode version
              run: xcodebuild -version

            - name: List schemes (debug)
              run: |
                  set -euo pipefail
                  xcodebuild -list -project GestorContas.xcodeproj

            - name: Build DocC archive (no signing)
              run: |
                  set -euo pipefail

                  # IMPORTANT: scheme name must match what "xcodebuild -list" shows
                  SCHEME="GestorContas"

                  xcodebuild docbuild \
                    -scheme "$SCHEME" \
                    -destination "generic/platform=iOS" \
                    -derivedDataPath .derivedData \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    DEVELOPMENT_TEAM=""

                  # Find generated .doccarchive
                  DOCCARCHIVE="$(find .derivedData -type d -name "*.doccarchive" | head -n 1 || true)"

                  if [ -z "${DOCCARCHIVE:-}" ]; then
                    echo "No .doccarchive found."
                    echo "Tip: confirm the scheme name and that docbuild succeeds locally."
                    exit 1
                  fi

                  echo "DocC archive: $DOCCARCHIVE"

                  # Export to static website into docs/docc
                  mkdir -p docs/docc
                  xcrun docc process-archive transform-for-static-hosting "$DOCCARCHIVE" \
                    --output-path docs/docc \
                    --hosting-base-path GestorContas

                  # Avoid Jekyll processing issues
                  touch docs/docc/.nojekyll

            - name: Commit and push generated DocC
              run: |
                  set -euo pipefail

                  if git status --porcelain | grep -q .; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add docs/docc
                    git commit -m "Update DocC (auto)"
                    git push
                  else
                    echo "No changes to commit."
                  fi
