name: Build DocC (Catalog) and publish to GitHub Pages (docs/)

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: docc-pages
    cancel-in-progress: true

jobs:
    docc:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Xcode version
              run: xcodebuild -version

            - name: Build DocC from catalog and export static site
              run: |
                  set -euo pipefail

                  CATALOG_PATH="Documentation/GestorContas.docc"
                  HOSTING_BASE_PATH="GestorContas"

                  if [ ! -d "$CATALOG_PATH" ]; then
                    echo "DocC catalog not found at: $CATALOG_PATH"
                    echo "Create it (Documentation/GestorContas.docc) and push again."
                    exit 1
                  fi

                  rm -rf docs/docc
                  mkdir -p docs/docc

                  # Convert catalog directly to a static website
                  xcrun docc convert "$CATALOG_PATH" \
                    --output-path docs/docc \
                    --transform-for-static-hosting \
                    --hosting-base-path "$HOSTING_BASE_PATH"

                  touch docs/docc/.nojekyll

            - name: Commit and push generated DocC
              run: |
                  set -euo pipefail

                  if git status --porcelain | grep -q .; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add docs/docc
                    git commit -m "Update DocC (auto)"
                    git push
                  else
                    echo "No changes to commit."
                  fi
